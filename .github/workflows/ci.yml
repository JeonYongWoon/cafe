# GitHub Actions 워크플로우의 이름입니다.
name: Java CI with Gradle

# main 브랜치로의 push 및 pull_request 이벤트가 발생할 때 실행되도록 설정합니다.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 리포지토리 소스 코드 읽기 권한을 부여합니다.
permissions:
  contents: read

jobs:
  build:
    # 실행 환경으로 최신 버전의 Ubuntu 리눅스 이미지를 사용합니다.
    runs-on: ubuntu-latest

    # 테스트 실행 시 Redis 연결이 필요하므로 Redis 서비스 컨테이너를 함께 기동합니다.
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    # 저장소의 코드를 가상 환경으로 가져옵니다.
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    # 프로젝트 환경에 맞춰 Java 17 버전을 설정합니다.
    - name: JDK 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Gradle 빌드 성능을 높이기 위해 의존성 캐싱을 적용합니다.
    - name: Gradle 설정
      uses: gradle/actions/setup-gradle@v3

    # Gradle 래퍼 스크립트 실행 권한을 부여합니다.
    - name: gradlew 실행 권한 부여
      run: chmod +x gradlew

    # Gradle을 사용하여 전체 프로젝트를 컴파일하고 테스트를 실행합니다.
    - name: Gradle 빌드 및 테스트 수행
      run: ./gradlew build
